<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b2f6a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Watch PWA</title>
<style>
html,body{
  margin:0;
  background:#000;
  height:100%;
  display:grid;
  place-items:center;
}
svg{
  width:min(100vw,calc(100vh*1080/1350));
  height:min(100vh,calc(100vw*1350/1080));
  display:block;
}
#d{
  font-family:Arial,Helvetica,sans-serif;
  font-weight:900;
  font-size:34px;
  fill:#111;
  text-anchor:middle;
  dominant-baseline:middle;
}
</style>
</head>
<body>
<svg viewBox="0 0 1080 1350">
  <image href="background.png" x="0" y="0" width="1080" height="1350"/>
  <image href="dial.png" x="234" y="227" width="612" height="896"/>

  <circle cx="498" cy="799" r="24" fill="#f5f5f5" stroke="#b7b7b7" stroke-width="3"/>
  <text id="d" x="498" y="799"></text>

  <g id="H" transform="rotate(0 505 658)">
    <image href="hour_plus8.png" x="482" y="494" width="44" height="189"/>
  </g>

  <g id="M" transform="rotate(0 505 658)">
    <image href="minute_minus8.png" x="481" y="463" width="46" height="218"/>
  </g>

  <g id="S" transform="rotate(0 505 658)">
    <image href="second.png" x="486" y="452" width="44" height="276"/>
  </g>

  <image href="cap.png" x="495" y="649" width="19" height="19"/>
</svg>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}

const Hh=document.getElementById("H");
const Mh=document.getElementById("M");
const Sh=document.getElementById("S");
const Dt=document.getElementById("d");

function tick(){
  const n=new Date();
  const s=n.getSeconds()+n.getMilliseconds()/1000;
  const m=n.getMinutes()+s/60;
  const h=(n.getHours()%12)+m/60;
  Hh.setAttribute("transform",`rotate(${h*30} 505 658)`);
  Mh.setAttribute("transform",`rotate(${m*6} 505 658)`);
  Sh.setAttribute("transform",`rotate(${s*6} 505 658)`);
  Dt.textContent=n.getDate();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
